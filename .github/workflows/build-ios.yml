name: Build unsigned IPA

on:
  push:
    branches: [main]
    paths-ignore:
      - "guest/**"
      - ".github/workflows/build-guest.yml"
  workflow_dispatch:

permissions:
  contents: write    # needed to create the GitHub Release

jobs:
  build:
    name: Build PocketClaude.ipa
    runs-on: macos-26
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract MARKETING_VERSION
        id: version
        run: |
          VERSION=$(grep 'MARKETING_VERSION:' project.yml | head -1 | sed 's/.*: *"\(.*\)".*/\1/')
          if [[ -z "$VERSION" ]]; then
            echo "::error::could not parse MARKETING_VERSION from project.yml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "PocketClaude v$VERSION (build ${{ github.run_number }})"

      - name: Select Xcode (latest 26.x)
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)/Contents/Developer" || true
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          ls -la PocketClaude.xcodeproj/

      # v0.2.2 diagnostic build:
      # - No UTM-SE download
      # - No QEMU framework extraction / embedding / codesign
      # - No guest image fetch
      # Purpose: prove whether the sideload-launch crash lives in the
      # framework payload (v0.2.1 shipped a full embed with adhoc-signed
      # UTM frameworks and still SIGHUP'd instantly on the user's device)
      # or in our own Swift/project setup. If v0.2.2 boots, the bisection
      # target is the framework payload. If v0.2.2 also crashes, the
      # target is our Swift/project setup — the boot log at
      # Documents/pocket-claude-boot.log tells us how far the process got.

      - name: Build archive (no signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project PocketClaude.xcodeproj \
            -scheme PocketClaude \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/PocketClaude.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            archive

      - name: Package unsigned IPA
        run: |
          APP=build/PocketClaude.xcarchive/Products/Applications/PocketClaude.app

          # Adhoc-sign the app binary so the sideloader has a clean
          # baseline to replace. Same as v0.2.1 for the main binary path.
          codesign --force --sign - --timestamp=none "$APP/PocketClaude"
          echo "=== Verification ==="
          codesign -dv "$APP" 2>&1 | head -5 || true
          echo "=== .app contents ==="
          ls -la "$APP"

          mkdir -p build/Payload
          cp -R "$APP" build/Payload/
          cd build
          /usr/bin/zip -qry PocketClaude-unsigned.ipa Payload/
          ls -lh PocketClaude-unsigned.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PocketClaude-unsigned-ipa
          path: build/PocketClaude-unsigned.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Publish as latest release (direct .ipa download)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: "PocketClaude v${{ steps.version.outputs.version }} (build ${{ github.run_number }})"
          body: |
            DIAGNOSTIC BUILD — no QEMU frameworks embedded, no guest image.

            Purpose: v0.2.0 and v0.2.1 both crashed at launch on sideloaded
            installs (SIGHUP within milliseconds of exec). This build strips
            everything QEMU-related to isolate whether the crash is in the
            framework payload or in our Swift/project setup.

            IMPORTANT — DELETE THE PREVIOUS INSTALL FIRST:
            iOS caches framework signatures per bundle-ID. Long-press the
            app icon and choose "Remove App" → "Delete App" before
            sideloading this build. A plain reinstall over v0.2.0/v0.2.1
            may inherit stale signature state and repeat the crash.

            After launch, the boot log is at:
              Files → On My iPhone → PocketClaude → pocket-claude-boot.log
            Expected lines (in order):
              dylib_ctor       — C constructor ran (main binary loaded)
              app_init         — Swift App.init ran
              delegate_launch  — UIApplicationDelegate fired
              root_appear      — first SwiftUI view mounted

            Commit: ${{ github.sha }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Permanent latest-build URL:
            https://github.com/${{ github.repository }}/releases/latest/download/PocketClaude-unsigned.ipa
          files: build/PocketClaude-unsigned.ipa
          make_latest: true
          draft: false
          prerelease: true
