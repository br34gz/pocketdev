name: Build unsigned IPA

on:
  push:
    branches: [main]
    paths-ignore:
      - "guest/**"
      - ".github/workflows/build-guest.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build PocketClaude.ipa
    runs-on: macos-26
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract MARKETING_VERSION
        id: version
        run: |
          VERSION=$(grep 'MARKETING_VERSION:' project.yml | head -1 | sed 's/.*: *"\(.*\)".*/\1/')
          if [[ -z "$VERSION" ]]; then
            echo "::error::could not parse MARKETING_VERSION from project.yml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "PocketClaude v$VERSION (build ${{ github.run_number }})"

      - name: Select Xcode (latest 26.x)
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)/Contents/Developer" || true
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          ls -la PocketClaude.xcodeproj/

      # v0.4.1 - dual-engine build.
      # v0.4.0 shipped only UTM.ipa's JIT qemu; user's StikDebug couldn't
      # inject JIT under LiveContainer's PluginKit runtime so mmap MAP_JIT
      # failed and the JIT-only binary exit()d. v0.4.1 bundles BOTH:
      #   - qemu-aarch64-softmmu-jit  (from UTM.ipa,   29 MB, JIT-only)
      #   - qemu-aarch64-softmmu-se   (from UTM-SE.ipa, 191 MB, TCTI interpreter)
      # Runtime picks JIT if the mmap probe succeeds, SE otherwise. Both
      # variants use the SAME support frameworks (UTM's 24-framework
      # closure is a superset of UTM-SE's 21-framework one).

      - name: Fetch UTM.ipa (JIT-capable QEMU)
        env:
          UTM_URL: https://github.com/utmapp/UTM/releases/download/v5.0.3/UTM.ipa
        run: |
          mkdir -p build/utm
          curl -sSL "$UTM_URL" -o build/utm/UTM.ipa
          cd build/utm && unzip -q UTM.ipa
          ls -lh UTM.ipa

      - name: Fetch UTM-SE.ipa (interpreter QEMU)
        env:
          UTM_SE_URL: https://github.com/utmapp/UTM/releases/download/v5.0.3/UTM-SE.ipa
        run: |
          mkdir -p build/utm-se
          curl -sSL "$UTM_SE_URL" -o build/utm-se/UTM-SE.ipa
          cd build/utm-se && unzip -q UTM-SE.ipa
          ls -lh UTM-SE.ipa

      - name: Extract support frameworks (24, from UTM.ipa)
        run: |
          mkdir -p build/staged-frameworks
          SRC="build/utm/Payload/UTM.app/Frameworks"
          for fw in \
              glib-2.0.0 gio-2.0.0 gobject-2.0.0 gmodule-2.0.0 \
              iconv.2 intl.8 ffi.8 \
              pixman-1.0 jpeg.62 epoxy.0 crypto.1.1 ssl.1.1 \
              slirp.0 zstd.1 spice-server.1 virglrenderer.1 vulkan.1 \
              gstreamer-1.0.0 gstbase-1.0.0 gstapp-1.0.0 opus.0 \
              Hypervisor usb-1.0.0 usbredirparser.1; do
            if [[ -d "$SRC/$fw.framework" ]]; then
              cp -R "$SRC/$fw.framework" build/staged-frameworks/
            else
              echo "::error::missing framework $fw in UTM.ipa"
              exit 1
            fi
          done
          find build/staged-frameworks -name _CodeSignature -type d \
              -exec rm -rf {} + 2>/dev/null || true

      - name: Stage both QEMU variants with distinct install names
        # Both UTM.ipa and UTM-SE.ipa ship a framework called exactly
        # `qemu-aarch64-softmmu.framework`. To have them coexist we
        # rename each: -jit and -se. That means renaming:
        #   the framework directory
        #   the binary inside (must match Info.plist CFBundleExecutable)
        #   LC_ID_DYLIB via install_name_tool (so dyld records the new
        #     @rpath at dlopen time)
        # QEMUBootstrap dlopens by absolute path so no rpath change is
        # needed for the app binary; each qemu variant remains a
        # runtime-loadable stand-alone framework.
        run: |
          stage_variant() {
            local src="$1"     # source .framework dir with the original name
            local suffix="$2"  # "jit" or "se"
            local new="qemu-aarch64-softmmu-${suffix}"
            local dest="build/staged-frameworks/${new}.framework"
            cp -R "$src" "$dest"
            find "$dest" -name _CodeSignature -type d -exec rm -rf {} + 2>/dev/null || true
            mv "$dest/qemu-aarch64-softmmu" "$dest/${new}"
            # Rewrite the LC_ID_DYLIB so the framework's install_name
            # matches its new path. Codesign will re-adhoc sign this
            # below; install_name_tool invalidates any prior signature
            # anyway, which is fine because we always re-sign.
            install_name_tool -id "@rpath/${new}.framework/${new}" "$dest/${new}"
            # Info.plist's CFBundleExecutable must match the binary name.
            plutil -replace CFBundleExecutable -string "${new}" "$dest/Info.plist"
            # Distinct CFBundleIdentifier so re-signers don't flag two
            # frameworks with the same identifier (which the raw upstream
            # bundles share as com.utmapp.qemu-aarch64-softmmu).
            plutil -replace CFBundleIdentifier -string "com.br34gz.pocketclaude.${new}" "$dest/Info.plist"
            # Sanity check.
            file "$dest/${new}" | head -1
          }
          stage_variant "build/utm/Payload/UTM.app/Frameworks/qemu-aarch64-softmmu.framework" jit
          stage_variant "build/utm-se/Payload/UTM SE.app/Frameworks/qemu-aarch64-softmmu.framework" se
          echo "=== dual-variant framework check ==="
          ls build/staged-frameworks | grep qemu-aarch64
          du -sh build/staged-frameworks

      - name: Extract qemu firmware
        # From UTM.ipa; same ROMs as UTM-SE.ipa but from a single source
        # to avoid duplication.
        run: |
          mkdir -p build/staged-firmware
          SRC="build/utm/Payload/UTM.app/qemu"
          if [[ ! -d "$SRC" ]]; then
            echo "::error::UTM firmware dir not found at $SRC"
            exit 1
          fi
          rsync -a --exclude 'edk2-*.fd' "$SRC/" build/staged-firmware/
          if [[ ! -f build/staged-firmware/efi-virtio.rom ]]; then
            echo "::error::efi-virtio.rom missing after firmware extraction"
            exit 1
          fi
          du -sh build/staged-firmware

      - name: Fetch guest image
        id: guest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p build/guest
          if gh release download guest-latest \
               --repo "$GITHUB_REPOSITORY" \
               --pattern 'alpine-claude.qcow2.zst' \
               --pattern 'vmlinuz-virt' \
               --pattern 'initramfs-virt' \
               --dir build/guest; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            ls -lh build/guest
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::error::guest-latest release missing - v0.3.0 needs the alpine image"
            exit 1
          fi

      - name: Build archive (no signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project PocketClaude.xcodeproj \
            -scheme PocketClaude \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/PocketClaude.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            archive

      - name: Package unsigned IPA
        run: |
          APP=build/PocketClaude.xcarchive/Products/Applications/PocketClaude.app

          mkdir -p "$APP/Frameworks"
          cp -R build/staged-frameworks/* "$APP/Frameworks/"

          mkdir -p "$APP/GuestImage"
          cp build/guest/* "$APP/GuestImage/"

          # v0.3.2: qemu firmware search path (-L in argv points here)
          mkdir -p "$APP/qemu-firmware"
          cp -R build/staged-firmware/* "$APP/qemu-firmware/"
          echo "=== firmware count in bundle ==="
          ls "$APP/qemu-firmware" | wc -l
          [[ -f "$APP/qemu-firmware/efi-virtio.rom" ]] || {
            echo "::error::efi-virtio.rom missing from final bundle"; exit 1;
          }

          # Adhoc-sign every framework mach-O + the app binary. Same
          # treatment that v0.2.4-v0.2.7 shipped safely.
          echo "=== Framework signature normalization ==="
          for fw in "$APP/Frameworks"/*.framework; do
            name=$(basename "$fw" .framework)
            bin="$fw/$name"
            if [[ -f "$bin" ]] && file "$bin" | grep -q "Mach-O"; then
              codesign --remove-signature "$bin" 2>/dev/null || true
              codesign --force --sign - --timestamp=none "$bin"
            fi
          done
          # v0.4.0: apply the JIT entitlements when we ad-hoc sign the
          # main binary. The signer (StikDebug / SideStore) will re-sign
          # with its own key at install, but the entitlement plist gets
          # carried through, giving the paired signer visibility into
          # what to grant. XcodeGen generates the .entitlements file at
          # `entitlements.path` from the properties block in project.yml.
          ENTS=PocketClaude/Resources/PocketClaude.entitlements
          if [[ -f "$ENTS" ]]; then
            echo "=== Entitlements being applied ==="
            plutil -p "$ENTS" | head -20
            codesign --force --sign - --timestamp=none \
              --entitlements "$ENTS" "$APP/PocketClaude"
          else
            echo "::warning::entitlements file $ENTS missing; signing without"
            codesign --force --sign - --timestamp=none "$APP/PocketClaude"
          fi
          echo "=== Verification ==="
          codesign -dv "$APP" 2>&1 | head -5 || true
          codesign -d --entitlements - "$APP/PocketClaude" 2>&1 | head -30 || true

          cat > "$APP/QEMU-NOTICE.txt" <<'NOTICE'
          This app bundle includes qemu-system-aarch64 and support libraries
          from utmapp/UTM (UTM-SE.ipa, v5.0.3), licensed under GNU GPL v2.

          Source code:
            QEMU:  https://gitlab.com/qemu-project/qemu
            UTM:   https://github.com/utmapp/UTM
            Build: https://github.com/utmapp/UTM/releases/tag/v5.0.3

          Pocket Claude itself is MIT-licensed; the combined redistributable
          IPA is effectively GPL-2 due to the bundled QEMU components.
          NOTICE

          mkdir -p build/Payload
          cp -R "$APP" build/Payload/
          cd build
          /usr/bin/zip -qry PocketClaude-unsigned.ipa Payload/
          ls -lh PocketClaude-unsigned.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PocketClaude-unsigned-ipa
          path: build/PocketClaude-unsigned.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Publish as latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: "PocketClaude v${{ steps.version.outputs.version }} (build ${{ github.run_number }})"
          body: |
            v0.5.0 - guest image v2 (claude-code startup fix).

            v0.4.1 booted Alpine end-to-end but claude 2.1.193
            deterministically crashed at interactive startup with
            "path ... without null bytes" - a Bun + Alpine musl +
            aarch64 compat bug in the credential-provider chain.

            v0.5.0 rebuilds the guest image with a smoke-tested install
            path. build-rootfs.sh now tries a priority list of install
            strategies (apk pinned to older versions, then latest apk,
            then npm) and only publishes an image whose claude survives
            a headless smoke test that checks for the null-bytes crash.

            The selected strategy is exposed both in the guest's
            /etc/pocket-claude-variant and via a new CLAUDE_VARIANT
            control-channel line the app reads and logs.

            Everything else (dual QEMU engine, entitlements, firmware,
            socket paths, memory guards) unchanged from v0.4.1.

            v0.4.0 shipped only UTM.ipa's JIT-only qemu. On the user's
            LiveContainer + StikDebug setup the mmap MAP_JIT probe
            returned 0 (StikDebug's register injection fails inside a
            PluginKit extension), so the JIT binary exited immediately
            with no fallback.

            v0.4.1 bundles BOTH QEMU variants side by side:
              qemu-aarch64-softmmu-jit  (UTM.ipa,     29 MB, JIT-only)
              qemu-aarch64-softmmu-se   (UTM-SE.ipa, 191 MB, interpreter)
            Renamed at CI time via install_name_tool so they coexist
            in Frameworks/. Same support library set (24 frameworks) -
            UTM.ipa's closure is a superset of UTM-SE.ipa's.

            Runtime picks:
              probe == 1 -> qemu-*-jit
              probe == 0 -> qemu-*-se
            Boot log tags the choice as qemu_variant_selected=jit|se.
            UI shows a colored JIT/SE pill in the toolbar and different
            "expected boot time" copy on the launching overlay.

            IPA size jumps 120 MB -> ~300 MB. Fair price for guaranteed
            boot in every reasonable install configuration.

            Install guidance for the user:
            - If JIT isn't landing under LiveContainer, try installing
              this IPA directly via SideStore/AltStore. LiveContainer's
              PluginKit runtime interferes with StikDebug's register
              injection; main-app-container installs don't have that
              limitation.
            - Under LiveContainer without StikDebug: SE fallback kicks
              in automatically. Boot is slow (5-20 minutes to login
              prompt) but reliable.

            Strategic pivot. Previous builds (v0.3.x) shipped QEMU from
            UTM-SE.ipa - a TCTI-interpreter build with no MAP_JIT, so it
            couldn't emit native code even when the runtime granted the
            exec permission. This build switches the source to UTM.ipa,
            whose QEMU framework is compiled with mmap(MAP_JIT) +
            pthread_jit_write_protect_np toggling.

            Framework delta:
              qemu-aarch64-softmmu  191 MB (SE, TCTI) -> 30 MB (JIT)
              + Hypervisor.framework   (UTM's stub for iOS)
              + usb-1.0.0
              + usbredirparser.1
            Total framework payload: 213 MB -> 51 MB.

            Entitlements now applied at ad-hoc codesign time:
              dynamic-codesigning: true
              com.apple.security.cs.allow-jit: true
              get-task-allow: true
              (plus the existing memory-limit + extended-virtual entitlements)
            The sideloader will re-sign, but the entitlement plist is
            carried through so StikDebug's paired signer sees what to
            grant.

            Also:
            - Default guest RAM 768 -> 1024 MB (v0.3.3 was defensive
              against jetsam; user confirmed increased-memory-limit is
              in play so we can be generous).
            - JIT probe (mmap MAP_JIT + W/X toggle) in BootLog.c; logs
              jit_probe_result=0/1 at app_init and drives the wizard
              performance step ("JIT allowed" vs "Interpreter mode").
            - Wizard performance step now shows the real probe result
              instead of a static "slow mode" note.
            - MainView "session ended" card gets a "QEMU holds process
              globals; if Retry fails, close and reopen" caveat.

            Expected under StikDebug on a JIT-capable device:
              15-30s boot to Alpine login vs multi-minute interpreter.

            v0.3.2 boot log showed QEMU launched, main loop entered,
            sockets connected, Alpine kernel started printing, then
            the log cut off with no qemu_exit_hook: classic iOS jetsam
            kill. LiveContainer runs sideloaded apps as PluginKit
            extensions with tighter memory quotas.

            Changes:
            - Default guest RAM dropped from 1024 MB to 768 MB.
            - Settings sheet with RAM slider (384-2048 MB, step 64),
              persisted via UserDefaults, read at engine start. Bottom
              toolbar menu gets a "Settings" entry.
            - Signal handlers installed at process start for SIGTERM,
              SIGABRT, SIGBUS, SIGSEGV, SIGILL. When any fires, boot
              log gets 'signal_received sig=N' before termination.
              (SIGKILL from jetsam cannot be caught.)
            - DispatchSource memory-pressure observer armed at engine
              start; warning/critical events tag the boot log plus
              the current RSS.
            - atexit hook now also logs rss_mb=N via mach_task_basic_info.
            - MainView 'session ended' overlay shows a jetsam-specific
              hint when the console started emitting but the VM stopped,
              plus Settings + Retry buttons right on the card.

            v0.3.1's qemu stderr revealed the definitive error:
              "qemu-aarch64-softmmu: failed to find romfile efi-virtio.rom"

            Two fixes shipped together:
            1. Bundle UTM's qemu firmware directory (12 MB, sans
               edk2-*.fd UEFI blobs we don't need for direct kernel
               boot) at Payload/PocketClaude.app/qemu-firmware/, and
               add `-L <that-path>` early in the qemu argv so it can
               find the ROMs.
            2. Switch from virtio-net-pci to virtio-net-device (MMIO)
               and virtio-serial-device (MMIO) - the MMIO transports on
               the aarch64 virt machine don't touch any PCI expansion
               ROM, sidestepping the class of failure entirely.

            Belt-and-braces: either fix alone should be sufficient;
            shipping both means we don't care which one takes.

            (Everything from v0.3.1 still applies: short socket paths,
             qemu stderr capture, delayed connect, full argv logging.)

            v0.3.0's boot log terminated at qemu_init_call -> qemu_exit_hook,
            confirming qemu_init exit()ed inside argv parsing. Culprit:
            unix socket paths under Documents/ + LiveContainer's nested
            Data/Application/<uuid>/ prefix pushed the paths past
            Darwin's 104-char sun_path limit, so QEMU's bind() failed
            and it exit(1)'d.

            Fixes:
            - Socket paths now sit directly in NSTemporaryDirectory()
              with single-char names ("c", "k", "q"). Length checked
              against 103 chars before qemu is invoked; overflows
              surface as VMState.error.
            - stderr redirected to Documents/pocket-claude-qemu-stderr.log
              before qemu_init, capturing the actual error message
              QEMU prints before exit().
            - Console-socket connect delayed 500ms so retries don't
              race qemu's bind().
            - Full argv logged (no truncation) so socket paths are
              visible in the boot log.
            - Diagnostic sheet now shows both the boot log AND the
              qemu stderr file. Copy button captures both.

            All 22 UTM QEMU frameworks + guest image (vmlinuz-virt +
            initramfs-virt + alpine-claude.qcow2.zst) embedded. QEMUVMEngine
            wired for real Alpine boot, with these guards against the
            v0.2.0 launch crash mode (qemu_init exit(2) on argv errors):

              - preflight file-existence check on every argv path;
                missing files become VMState.error(...) before
                qemu_init is called
              - atexit hook logs `qemu_exit_hook` before termination
                so even a qemu-caused exit(2) leaves a breadcrumb
              - 90s boot-timeout watchdog surfaces "Boot timeout" if
                no console bytes arrive
              - MainView shows a status overlay: "Launching QEMU..."
                while starting, error card + Retry on failure

            Boot log adds a lot of new phases; every step of the
            engine start-up is timestamped in
            Documents/pocket-claude-boot.log.

            SIZE: ~140 MB download, ~700 MB installed. First launch
            decompresses alpine-claude.qcow2.zst into ~/Documents; can
            take 10-15 seconds. Interpreter-mode boot to Alpine login
            can be slow (30-60s expected, potentially longer without JIT).

            IMPORTANT - DELETE THE PREVIOUS INSTALL FIRST:
            Long-press icon -> Remove App -> Delete App. Old
            Documents/alpine-claude.qcow2 from a partial install would
            not need re-decompressing; a fresh install ensures a clean
            qcow2.

            Commit: ${{ github.sha }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Permanent latest-build URL:
            https://github.com/${{ github.repository }}/releases/latest/download/PocketClaude-unsigned.ipa
          files: build/PocketClaude-unsigned.ipa
          make_latest: true
          draft: false
          prerelease: false
