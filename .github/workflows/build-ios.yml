name: Build unsigned IPA

on:
  push:
    branches: [main]
    paths-ignore:
      - "guest/**"
      - ".github/workflows/build-guest.yml"
  workflow_dispatch:

permissions:
  contents: write    # needed to create the GitHub Release

jobs:
  build:
    name: Build PocketClaude.ipa
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract MARKETING_VERSION
        id: version
        run: |
          VERSION=$(grep 'MARKETING_VERSION:' project.yml | head -1 | sed 's/.*: *"\(.*\)".*/\1/')
          if [[ -z "$VERSION" ]]; then
            echo "::error::could not parse MARKETING_VERSION from project.yml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "PocketClaude v$VERSION (build ${{ github.run_number }})"

      - name: Select Xcode (latest 26.x)
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)/Contents/Developer" || true
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          ls -la PocketClaude.xcodeproj/

      # v0.2.7 — framework bisection layer "qemu" (the main event).
      # 22 frameworks embedded total. This adds only qemu-aarch64-softmmu
      # on top of v0.2.6's 21 (which all launched cleanly on device).
      # All of qemu-aarch64-softmmu's @rpath deps are already present in
      # the v0.2.6 set (pixman, jpeg, epoxy, gio, gobject, glib, zstd,
      # slirp, spice-server, virglrenderer, gmodule) — verified via
      # otool -L. VM engine still routed to stub — we're not dlopen'ing
      # qemu yet, just testing whether dyld / amfid accept it at
      # process start.
      #
      # None of these are dlopen'd by our code — the VM engine is still
      # routed to the stub. The test is whether iOS amfid / the
      # sideloader accept the combined 12-framework set at install and
      # launch, on the way to identifying which of the 22 frameworks
      # from v0.2.0/v0.2.1 caused the SIGHUP.
      #
      # v0.2.4 glib set (verified clean, from otool -L):
      #   glib-2.0.0   -> iconv.2, intl.8
      #   gio-2.0.0    -> glib, gobject, gmodule, intl
      #   gobject-2.0.0 -> glib, ffi.8
      #   gmodule-2.0.0 -> glib
      #   iconv.2      -> (self)
      #   intl.8       -> iconv.2
      #   ffi.8        -> (self)
      #
      # v0.2.5 additions (verified clean on device):
      #   pixman-1.0   -> (self)
      #   jpeg.62      -> (self)
      #   epoxy.0      -> (self)
      #   crypto.1.1   -> (self)   [openssl 1.1 crypto lib]
      #   ssl.1.1      -> crypto.1.1
      #
      # v0.2.6 additions (verified clean on device):
      #   slirp.0, zstd.1, spice-server.1, virglrenderer.1, vulkan.1,
      #   gstreamer-1.0.0, gstbase-1.0.0, gstapp-1.0.0, opus.0
      #
      # v0.2.7 addition (verified: deps closed inside v0.2.6 set):
      #   qemu-aarch64-softmmu  191 MB
      #     -> pixman, jpeg, epoxy, gio, gobject, glib, zstd, slirp,
      #        spice-server, virglrenderer, gmodule
      #
      # If v0.2.7 crashes and v0.2.6 didn't: the offender is
      # qemu-aarch64-softmmu specifically. Next iteration adds dyld_info
      # -platform and otool -l output for the qemu framework so we can
      # see MinimumOSVersion, LC_ATOM_INFO, C constructors etc.

      - name: Fetch UTM-SE (source of the iOS QEMU frameworks)
        env:
          UTM_SE_URL: https://github.com/utmapp/UTM/releases/download/v5.0.3/UTM-SE.ipa
        run: |
          mkdir -p build/utm
          curl -sSL "$UTM_SE_URL" -o build/utm/UTM-SE.ipa
          ls -lh build/utm/UTM-SE.ipa
          cd build/utm
          unzip -q UTM-SE.ipa

      - name: Extract full framework set (glib + pixman_crypto + io_display + qemu)
        run: |
          mkdir -p build/staged-frameworks
          SRC="build/utm/Payload/UTM SE.app/Frameworks"
          for fw in \
              glib-2.0.0 gio-2.0.0 gobject-2.0.0 gmodule-2.0.0 \
              iconv.2 intl.8 ffi.8 \
              pixman-1.0 jpeg.62 epoxy.0 crypto.1.1 ssl.1.1 \
              slirp.0 zstd.1 spice-server.1 virglrenderer.1 vulkan.1 \
              gstreamer-1.0.0 gstbase-1.0.0 gstapp-1.0.0 opus.0 \
              qemu-aarch64-softmmu; do
            if [[ -d "$SRC/$fw.framework" ]]; then
              cp -R "$SRC/$fw.framework" build/staged-frameworks/
            else
              echo "::error::missing framework $fw in UTM-SE.ipa"
              exit 1
            fi
          done
          # Strip UTM's ad-hoc resource seals so codesign below emits
          # fresh, macos-native ones instead of re-writing UTM's.
          find build/staged-frameworks -name _CodeSignature -type d \
              -exec rm -rf {} + 2>/dev/null || true
          du -sh build/staged-frameworks
          ls build/staged-frameworks

      - name: Build archive (no signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project PocketClaude.xcodeproj \
            -scheme PocketClaude \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/PocketClaude.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            archive

      - name: Package unsigned IPA
        run: |
          APP=build/PocketClaude.xcarchive/Products/Applications/PocketClaude.app

          mkdir -p "$APP/Frameworks"
          cp -R build/staged-frameworks/* "$APP/Frameworks/"

          # Same treatment as v0.2.1: strip and re-adhoc-sign every
          # framework mach-O so the sideloader has a uniform baseline.
          echo "=== Framework signature normalization ==="
          for fw in "$APP/Frameworks"/*.framework; do
            name=$(basename "$fw" .framework)
            bin="$fw/$name"
            if [[ -f "$bin" ]] && file "$bin" | grep -q "Mach-O"; then
              codesign --remove-signature "$bin" 2>/dev/null || true
              codesign --force --sign - --timestamp=none "$bin"
              minos=$(otool -l "$bin" | awk '/LC_BUILD_VERSION/{f=1} f && /minos/{print $2; exit}')
              echo "  $name  minos=$minos  signed=adhoc"
            fi
          done
          codesign --force --sign - --timestamp=none "$APP/PocketClaude"
          echo "=== Verification ==="
          codesign -dv "$APP" 2>&1 | head -5 || true
          echo "=== .app contents ==="
          ls -la "$APP"

          mkdir -p build/Payload
          cp -R "$APP" build/Payload/
          cd build
          /usr/bin/zip -qry PocketClaude-unsigned.ipa Payload/
          ls -lh PocketClaude-unsigned.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PocketClaude-unsigned-ipa
          path: build/PocketClaude-unsigned.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Publish as latest release (direct .ipa download)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: "PocketClaude v${{ steps.version.outputs.version }} (build ${{ github.run_number }})"
          body: |
            FRAMEWORK BISECTION — layer "qemu" (the main event).
            22 frameworks embedded — the full set from
            utmapp/UTM v5.0.3 UTM-SE.ipa, ad-hoc re-signed.

            HEADS UP — download size jumps from ~7 MB (v0.2.6) to
            ~150 MB. That's qemu-aarch64-softmmu, the 191 MB QEMU
            binary itself.

            v0.2.4-v0.2.6 set (all confirmed clean on device):
              glib-2.0.0, gio-2.0.0, gobject-2.0.0, gmodule-2.0.0,
              iconv.2, intl.8, ffi.8, pixman-1.0, jpeg.62, epoxy.0,
              crypto.1.1, ssl.1.1, slirp.0, zstd.1, spice-server.1,
              virglrenderer.1, vulkan.1, gstreamer-1.0.0,
              gstbase-1.0.0, gstapp-1.0.0, opus.0  (21 total)

            v0.2.7 addition (delta):
              qemu-aarch64-softmmu   the actual QEMU binary

            None are dlopen'd or LC_LOAD_DYLIB'd by our code — the VM
            engine is still routed to the stub. Purely testing whether
            iOS amfid / the sideloader accept the full 22-set at
            install/launch. If v0.2.7 crashes and v0.2.6 didn't, we
            have narrowed the offender to qemu-aarch64-softmmu itself.

            IMPORTANT — DELETE THE PREVIOUS INSTALL FIRST:
            Long-press icon → Remove App → Delete App before installing.
            iOS caches signatures per bundle-ID; a plain reinstall can
            inherit stale amfid state.

            Expected outcome (if the framework is amfid-safe):
            identical UI to v0.2.6 — launches to the wizard,
            workspace picker works, Finish transitions to MainView
            with the stub terminal. Boot log should show all four
            layer markers (glib, pixman_crypto, io_display, qemu)
            right after `dylib_ctor`.

            If it crashes: the offender is qemu-aarch64-softmmu itself,
            and the next build ships dyld_info + otool -l output for
            that framework so we can see what dyld is choking on.

            If it crashes: last line in the boot log tells us which
            phase died. Copy it via the yellow banner → sheet → Copy.

            Commit: ${{ github.sha }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Permanent latest-build URL:
            https://github.com/${{ github.repository }}/releases/latest/download/PocketClaude-unsigned.ipa
          files: build/PocketClaude-unsigned.ipa
          make_latest: true
          draft: false
          prerelease: false
