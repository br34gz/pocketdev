# Project spec consumed by XcodeGen. Generates PocketClaude.xcodeproj.
# Run locally: xcodegen generate
# In CI: the build workflow installs XcodeGen then runs xcodegen generate before xcodebuild archive.

name: PocketClaude
options:
  bundleIdPrefix: com.br34gz
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    exactVersion: "1.13.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  PocketClaude:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PocketClaude/Sources
    resources:
      - path: PocketClaude/Resources/Assets.xcassets
    dependencies:
      - package: SwiftTerm
    # Entitlements are not embedded in the unsigned build (CODE_SIGNING_ALLOWED=NO)
    # but the file ships in the repo/IPA so sideload signers (LiveContainer,
    # SideStore, AltStore) can apply them at re-sign time. The VM needs
    # increased-memory-limit + extended-virtual-addressing per spec section 3.
    entitlements:
      path: PocketClaude/Resources/PocketClaude.entitlements
      properties:
        com.apple.developer.kernel.increased-memory-limit: true
        com.apple.developer.kernel.extended-virtual-addressing: true
    info:
      path: PocketClaude/Resources/Info.plist
      properties:
        CFBundleDisplayName: Pocket Claude
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_NAME: PocketClaude
        PRODUCT_BUNDLE_IDENTIFIER: com.br34gz.pocketclaude
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
