# Project spec consumed by XcodeGen. Generates PocketClaude.xcodeproj.
# Run locally: xcodegen generate
# In CI: the build workflow installs XcodeGen then runs xcodegen generate before xcodebuild archive.

name: PocketClaude
options:
  bundleIdPrefix: com.br34gz
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    exactVersion: "1.13.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.6.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  PocketClaude:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PocketClaude/Sources
    resources:
      - path: PocketClaude/Resources/Assets.xcassets
    dependencies:
      - package: SwiftTerm
    # Entitlements are not embedded in the unsigned build (CODE_SIGNING_ALLOWED=NO)
    # but the file ships in the repo/IPA so sideload signers (LiveContainer,
    # SideStore, AltStore) can apply them at re-sign time. The VM needs
    # increased-memory-limit + extended-virtual-addressing per spec section 3.
    entitlements:
      path: PocketClaude/Resources/PocketClaude.entitlements
      properties:
        # Memory ceiling entitlements matching UTM's own claim set. The
        # user's LiveContainer carries increased-memory-limit and it
        # extends to the sideloaded app.
        com.apple.developer.kernel.increased-memory-limit: true
        com.apple.developer.kernel.extended-virtual-addressing: true
        # JIT: dynamic-codesigning is the iOS/macOS entitlement UTM ships
        # to allow MAP_JIT allocations and W/X page toggling via
        # pthread_jit_write_protect_np. Without this the QEMU-JIT build
        # from UTM.ipa can't emit native code and falls back to TCG.
        # allow-jit is macOS Big Sur+ hardened-runtime; harmless on iOS
        # and matches what StikDebug's paired signer looks for.
        dynamic-codesigning: true
        com.apple.security.cs.allow-jit: true
        get-task-allow: true
    info:
      path: PocketClaude/Resources/Info.plist
      properties:
        CFBundleDisplayName: PocketDev
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        ITSAppUsesNonExemptEncryption: false
        # Diagnostic aid: expose the Documents/ folder in the iOS Files
        # app so the user can retrieve pocket-claude-boot.log without a
        # Mac tether. Cheap and always-on.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
    settings:
      base:
        PRODUCT_NAME: PocketClaude
        PRODUCT_BUNDLE_IDENTIFIER: com.br34gz.pocketclaude
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Bridging header exposes QEMUBootstrap.h (C) to Swift.
        SWIFT_OBJC_BRIDGING_HEADER: PocketClaude/Sources/VM/PocketClaude-Bridging-Header.h
        # Frameworks/ is populated post-archive with UTM's qemu + deps.
        # iOS apps get @executable_path/Frameworks as an rpath by
        # default; explicit here for clarity.
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/Frameworks"
